# Compose para el deploy en la nube (Railway), donde NO hay Kafka.
#
# Solo dos servicios: la base de datos (con datos de ejemplo cargados via
# db/seed.sql) y el b2b-dashboard, que expone el endpoint B2B (/api/trends
# y la vista web) sobre esas tendencias precargadas.
#
# El flujo completo con Kafka (intake-simulator -> broker -> esp/cep ->
# dashboard) se demuestra localmente con `docker compose up` usando el
# docker-compose.yml principal.

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: mordisbot-db
    environment:
      POSTGRES_USER: mordisbot
      POSTGRES_PASSWORD: mordisbot
      POSTGRES_DB: mordisbot
    ports:
      - "5432:5432"
    volumes:
      - mordisbot-db-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  b2b-dashboard:
    build: ./services/b2b-dashboard
    container_name: mordisbot-b2b-dashboard
    depends_on:
      - db
    ports:
      - "3000:3000"
    env_file: .env

volumes:
  mordisbot-db-data:
